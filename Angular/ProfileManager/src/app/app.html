<router-outlet />
<hlm-toaster />

<hlm-alert-dialog
  [state]="profileService.pendingDeleteId() !== null ? 'open' : 'closed'"
  (closed)="profileService.cancelDelete()"
>
  <hlm-alert-dialog-content *brnAlertDialogContent>
    <h3 hlmAlertDialogTitle>Confirm Delete</h3>
    <p hlmAlertDialogDescription>Do you want to delete this record?</p>
    <hlm-alert-dialog-footer>
      <button type="button" hlmAlertDialogCancel>Cancel</button>
      <button
        type="button"
        hlmAlertDialogAction
        class="bg-destructive hover:bg-destructive/90 text-white"
        (click)="profileService.confirmDelete()"
      >
        Delete
      </button>
    </hlm-alert-dialog-footer>
  </hlm-alert-dialog-content>
</hlm-alert-dialog>
