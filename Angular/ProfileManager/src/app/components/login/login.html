<div class="mb-4 p-8 flex items-center justify-center h-screen">
  <p-card class="w-full max-w-md">
    <ng-template #title> Login </ng-template>
    <form [formRoot]="loginForm" class="flex flex-col gap-4">
      <p-floatlabel class="w-full" variant="on">
        <input
          [class.p-invalid]="loginForm.email().touched() && loginForm.email().invalid()"
          pInputText
          type="email"
          inputId="login-email"
          pSize="large"
          [formField]="loginForm.email"
          fluid
        />
        <label for="login-email">Email</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <input
          [class.p-invalid]="loginForm.password().touched() && loginForm.password().invalid()"
          pInputText
          type="password"
          inputId="login-password"
          pSize="large"
          [formField]="$any(loginForm.password)"
          fluid
        />
        <label for="login-password">Password</label>
      </p-floatlabel>
      <p-button
        [loading]="loginForm().submitting()"
        label="Save"
        class="w-full"
        styleClass="w-full"
        type="submit"
      />
    </form>
  </p-card>
</div>
