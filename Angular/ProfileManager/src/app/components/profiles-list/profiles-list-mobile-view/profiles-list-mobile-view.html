@if (isLoading()) {
  <div class="w-full">
    <div class="flex flex-col gap-4 p-4">
      <div class="flex items-center justify-between">
        <div hlmSkeleton class="h-8 w-48"></div>
        <div hlmSkeleton class="h-8 w-8"></div>
      </div>
      <div hlmSkeleton class="h-8 w-40"></div>
      <div hlmSkeleton class="h-8 w-32"></div>
      <div class="mt-2 flex w-full gap-2">
        <div hlmSkeleton class="h-8 w-40"></div>
        <div hlmSkeleton class="h-8 w-40"></div>
      </div>
    </div>
  </div>
} @else {
  <div class="mt-2 grid w-full grid-cols-1 gap-0">
    @for (profile of pagedData(); track profile.id) {
      <div
        role="button"
        tabindex="0"
        [class]="profile | profileCardClass : $first"
        (click)="userActionEvent('view', profile.id)"
        (keydown.enter)="userActionEvent('view', profile.id)"
      >
        <!-- Header: name + kebab menu -->
        <div class="flex items-start justify-between gap-2">
          <div class="text-base font-semibold">{{ profile.name }}</div>
          <button
            type="button"
            hlmBtn
            variant="ghost"
            size="icon-sm"
            aria-label="More actions"
            [hlmDropdownMenuTrigger]="profileMenu"
            (click)="$event.stopPropagation()"
          >
            <ng-icon hlm name="lucideMoreVertical" size="sm" />
          </button>
          <ng-template #profileMenu>
            <hlm-dropdown-menu>
              <button
                type="button"
                hlmDropdownMenuItem
                (click)="userActionEvent('edit', profile.id)"
              >
                <ng-icon hlm name="lucidePencil" size="sm" />
                Edit
              </button>
              <button
                type="button"
                hlmDropdownMenuItem
                class="text-destructive focus:text-destructive"
                (click)="userActionEvent('delete', profile.id)"
              >
                <ng-icon hlm name="lucideTrash2" size="sm" />
                Delete
              </button>
            </hlm-dropdown-menu>
          </ng-template>
        </div>

        <!-- Metadata: zodiac + city -->
        <div class="text-muted-foreground flex flex-wrap items-center gap-2 text-sm">
          <span class="flex items-center gap-1">
            <ng-icon hlm name="lucideStar" size="sm" /> {{ profile.zodiacSign | titlecase }}
          </span>
          <span>|</span>
          <span class="flex items-center gap-1">
            <ng-icon hlm name="lucideMapPin" size="sm" /> {{ profile.city }}
          </span>
        </div>

        <!-- Status badge -->
        <div>
          <span hlmBadge variant="secondary" [class]="profile.profileStatusColor ?? ''">
            {{ profile.profileStatus }}
          </span>
        </div>

        <!-- Copy buttons -->
        <div class="flex w-full gap-2" (click)="$event.stopPropagation()">
          <button
            type="button"
            hlmBtn
            variant="outline"
            size="sm"
            class="w-full flex-1"
            (click)="copyToClipboard(profile.matrimonyId, 'Matrimony ID')"
          >
            {{ profile.matrimonyId }}
            <ng-icon hlm name="lucideCopy" size="sm" />
          </button>
          <button
            type="button"
            hlmBtn
            variant="outline"
            size="sm"
            class="w-full flex-1"
            (click)="copyToClipboard(profile.mobileNumber, 'Mobile Number')"
          >
            {{ profile.mobileNumber }}
            <ng-icon hlm name="lucideCopy" size="sm" />
          </button>
        </div>
      </div>
    }
  </div>
  <hlm-numbered-pagination
    [totalItems]="profileData().length"
    [pageSizes]="[10, 25, 50]"
    [(currentPage)]="currentPage"
    [(itemsPerPage)]="pageSize"
  />
}
