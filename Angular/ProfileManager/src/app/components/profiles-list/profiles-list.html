<div class="layout-wrapper">
  <div class="layout-main-container">
    <div class="layout-main">
      @let openDrawerValue = openDrawer();
      @let actionTypeValue = actionType();
      @let selectedProfileIdValue = selectedProfileId();
      <app-toolbar
        (openStarMatch)="toggleStarMatch.set(true)"
        (openZodiacSign)="toggleZodiacSigns.set(true)"
      />
      @let profileValue = profiles.value();
      <div class="hidden md:block">
        <app-profiles-list-desktop-view
          [profileData]="profileValue ?? []"
          [isLoading]="profiles.isLoading()"
        />
      </div>
      @if (openDrawerValue) {
        <app-profile
          [actionType]="actionTypeValue"
          [openDrawer]="openDrawerValue"
          [selectedProfileId]="selectedProfileIdValue"
        />
      }
      <div class="block md:hidden">
        <app-profiles-list-mobile-view
          [profileData]="profileValue ?? []"
          [isLoading]="profiles.isLoading()"
        />
      </div>
      <!-- Zodic Signs -->
      <app-zodiac-signs
        [togglePopover]="toggleZodiacSigns()"
        (zodiacSignsHidden)="toggleZodiacSigns.set(false)"
      />
      <!-- Star Matching -->
      <app-star-match
        [togglePopover]="toggleStarMatch()"
        (starMatchHidden)="toggleStarMatch.set(false)"
      />
    </div>
  </div>
</div>
