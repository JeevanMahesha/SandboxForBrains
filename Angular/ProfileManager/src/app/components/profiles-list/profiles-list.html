<div class="layout-wrapper">
  <div class="layout-main-container">
    <div class="layout-main">
      <app-toolbar />
      <div class="hidden md:block">
        @defer (on viewport) {
          <app-profiles-list-desktop-view
            [pagedData]="profiles.value() ?? []"
            [totalItems]="profileService.totalCount()"
            [isLoading]="profiles.isLoading()"
          />
        } @placeholder {
          <div class="flex justify-center m-10">
            <ng-container *ngTemplateOutlet="loader" />
          </div>
        }
      </div>

      @defer (when isOpened() === 'open') {
        <app-profile />
      }
      <div class="block md:hidden">
        @defer (on viewport) {
          <app-profiles-list-mobile-view
            [pagedData]="profiles.value() ?? []"
            [isLoading]="profiles.isLoading()"
          />
        } @placeholder {
          <div class="flex justify-center m-10">
            <ng-container *ngTemplateOutlet="loader" />
          </div>
        }
      </div>

      @if (!profiles.isLoading()) {
        <hlm-numbered-pagination
          [totalItems]="profileService.totalCount()"
          [pageSizes]="[10, 25, 50]"
          [currentPage]="profileService.pageState().pageIndex + 1"
          [itemsPerPage]="profileService.pageState().pageSize"
          (currentPageChange)="onPageChange($event)"
          (itemsPerPageChange)="onPageSizeChange($event)"
        />
      }
    </div>
  </div>
</div>

<!-- Mobile FAB: Add Profile -->
<button
  type="button"
  hlmBtn
  size="icon"
  class="md:hidden fixed bottom-6 right-6 z-50 size-14 rounded-full shadow-lg"
  aria-label="Add profile"
  (click)="profileService.userActionEvent('create', null)"
>
  <ng-icon hlm name="lucidePlus" class="size-6!" />
</button>

<ng-template #loader>
  <hlm-spinner class="text-[8rem]" />
</ng-template>
