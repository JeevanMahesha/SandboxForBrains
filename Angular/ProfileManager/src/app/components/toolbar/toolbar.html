<div
  class="bg-card text-card-foreground flex flex-col gap-3 rounded-md border p-3 lg:flex-row lg:items-center lg:justify-between"
>
  <!-- Start: sort + filters -->
  <div class="flex flex-col gap-2 md:flex-row md:items-center">
    <div class="flex w-36 items-center gap-2 text-sm">
      <hlm-switch aria-label="Sort order" [formField]="filterForm.viewOrderCheck" />
      <span>{{ filterForm.viewOrderCheck().value() ? 'Newest' : 'Oldest' }}</span>
    </div>

    <hlm-select placeholder="Select Status" [formField]="$any(filterForm.profileStatus)">
      <hlm-select-trigger class="w-44">
        <hlm-select-value placeholder="Select Status" />
      </hlm-select-trigger>
      <hlm-select-content *hlmSelectPortal>
        @for (status of profileStatusOptions; track status.value) {
          <hlm-select-item [value]="status.value">{{ status.label }}</hlm-select-item>
        }
      </hlm-select-content>
    </hlm-select>

    <hlm-select placeholder="Select Star" [formField]="$any(filterForm.starMatchScore)">
      <hlm-select-trigger class="w-44">
        <hlm-select-value placeholder="Select Star" />
      </hlm-select-trigger>
      <hlm-select-content *hlmSelectPortal>
        @for (score of scoreMatchOptions; track score) {
          <hlm-select-item [value]="score">{{ score }}</hlm-select-item>
        }
      </hlm-select-content>
    </hlm-select>
  </div>

  <!-- Center: search -->
  <div class="relative md:w-64">
    <ng-icon
      hlm
      name="lucideSearch"
      size="sm"
      class="text-muted-foreground pointer-events-none absolute top-1/2 left-2.5 -translate-y-1/2"
    />
    <input
      hlmInput
      type="text"
      placeholder="Search"
      class="w-full pl-8"
      [formField]="filterForm.searchQuery"
    />
  </div>

  <!-- End: actions -->
  <div class="flex flex-col gap-2 md:flex-row">
    <button
      type="button"
      hlmBtn
      variant="outline"
      [disabled]="!filterHasValue()"
      (click)="clearForm()"
    >
      <ng-icon hlm name="lucideFilterX" size="sm" />
      Clear
    </button>

    <div class="flex">
      <button type="button" hlmBtn class="rounded-r-none" (click)="addNewProfileAction()">
        <ng-icon hlm name="lucideUserPlus" size="sm" />
        Add Profile
      </button>
      <button
        type="button"
        hlmBtn
        class="rounded-l-none border-l border-l-primary-foreground/20 px-2"
        aria-label="More actions"
        [hlmDropdownMenuTrigger]="addMenu"
      >
        <ng-icon hlm name="lucideChevronDown" size="sm" />
      </button>
      <ng-template #addMenu>
        <hlm-dropdown-menu>
          <button type="button" hlmDropdownMenuItem (click)="openZodiacSignPopover()">
            <ng-icon hlm name="lucideSparkles" size="sm" />
            Zodiac Signs
          </button>
          <button type="button" hlmDropdownMenuItem (click)="openStarMatchPopover()">
            <ng-icon hlm name="lucideStar" size="sm" />
            Preferred Star
          </button>
          <button type="button" hlmDropdownMenuItem (click)="logout()">
            <ng-icon hlm name="lucideLogOut" size="sm" />
            Log Out
          </button>
        </hlm-dropdown-menu>
      </ng-template>
    </div>
  </div>
</div>
