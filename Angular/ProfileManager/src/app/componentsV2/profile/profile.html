<p-drawer
  [visible]="openDrawer() ?? false"
  header="{{ title() }}"
  styleClass="!w-full md:!w-80 lg:!w-[30rem]"
  position="right"
  (onHide)="closeDrawer()"
  dismissible="false"
>
  <form [formRoot]="profileDetailForm">
    <div class="flex flex-col mt-2 gap-4">
      <p-floatlabel class="w-full" variant="on">
        <input
          [formField]="profileDetailForm.name"
          pInputText
          type="text"
          pSize="large"
          inputId="name"
          fluid
        />
        <label for="name">Name</label>
      </p-floatlabel>

      <p-floatlabel class="w-full" variant="on">
        <p-select
          [formField]="$any(profileDetailForm.profileStatusId)"
          inputId="profile_status"
          [options]="PROFILE_STATUS_DATA | keyvalue"
          optionLabel="value"
          optionValue="key"
          class="w-full"
        />
        <label for="profile_status">Profile Status</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <input
          [formField]="profileDetailForm.mobileNumber"
          pInputText
          type="tel"
          inputId="mobile_number"
          pSize="large"
          placeholder="+91XXXXXXXXXX"
          fluid
        />
        <label for="mobile_number">Mobile Number</label>
      </p-floatlabel>

      <p-inputgroup>
        <input [formField]="profileDetailForm.matrimonyId" pInputText placeholder="Matrimony ID" />
        @if (actionType() === 'view') {
          <p-inputgroup-addon>
            <p-button icon="pi pi-copy" severity="secondary" />
          </p-inputgroup-addon>
        }
      </p-inputgroup>
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [formField]="$any(profileDetailForm.zodiacSign)"
          inputId="zodiac_sign"
          [options]="ZODIAC_SIGN_DATA"
          optionLabel="value"
          optionValue="key"
          class="w-full"
        />
        <label for="zodiac_sign">Zodiac Sign</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [formField]="$any(profileDetailForm.star)"
          inputId="star_sign"
          [options]="STARS_DATA"
          optionLabel="value"
          optionValue="key"
          class="w-full"
        />
        <label for="star_sign">Star Sign</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-inputnumber
          [formField]="$any(profileDetailForm.age)"
          fluid
          inputId="age"
          mode="decimal"
          [min]="22"
          [max]="29"
        />
        <label for="age">Age</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-inputnumber
          [formField]="$any(profileDetailForm.starMatchScore)"
          fluid
          inputId="star_match_score"
          mode="decimal"
          [min]="5"
          [max]="12"
        />
        <label for="star_match_score">Star Match Score</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [formField]="$any(profileDetailForm.state)"
          inputId="state"
          [options]="STATE_LIST"
          class="w-full"
        />
        <label for="state">State</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [formField]="$any(profileDetailForm.city)"
          inputId="city"
          [options]="cityList()"
          class="w-full"
        />
        <label for="city">City</label>
      </p-floatlabel>
      <p-inputgroup>
        <input pInputText placeholder="Comments" />
        <p-inputgroup-addon>
          <p-button icon="pi pi-plus" severity="secondary" />
        </p-inputgroup-addon>
      </p-inputgroup>
      <p-timeline [value]="events" class="w-full md:w-80" align="alternate">
        <ng-template #content let-event>
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" />
          <small class="text-surface-500 dark:text-surface-400">{{ event.date }} </small>
          {{ event.status }}
        </ng-template>
      </p-timeline>
    </div>
  </form>
  <ng-template #footer>
    <div
      class="flex items-center gap-2 justify-end w-full bg-white border-t border-surface-200 p-3"
    >
      <p-button type="submit" label="Save Changes" icon="pi pi-check" (onClick)="onSubmit()" />
    </div>
  </ng-template>
</p-drawer>
