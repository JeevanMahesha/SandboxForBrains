<p-table
  [value]="profileData()"
  stripedRows
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[10, 25, 50]"
  [loading]="isLoading()"
  [totalRecords]="profileData().length"
  class="p-treetable-sm mt-2"
>
  <ng-template #header>
    <tr>
      <th>Serial No</th>
      <th>Name</th>
      <th>Zodiac Sign</th>
      <th>City</th>
      <th>Profile Status</th>
      <th>Star Match Score</th>
      <th>Clip Board</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template #body let-profile let-ri="rowIndex">
    <tr>
      <td>{{ ri + 1 }}</td>
      <td>{{ profile.name }}</td>
      <td>{{ profile.zodiacSign }}</td>
      <td>{{ profile.city }}</td>
      <td>{{ profile.profileStatus }}</td>
      <td>
        <div class="flex gap-2">
          <p-button
            label="MatrimonyId"
            [rounded]="true"
            severity="secondary"
            icon="pi pi-copy"
            iconPos="right"
          />
          <p-button
            label="MobileNo"
            [rounded]="true"
            severity="secondary"
            icon="pi pi-copy"
            iconPos="right"
          />
        </div>
      </td>
      <td>{{ profile.starMatchScore }}</td>
      <td>
        <p-button
          icon="pi pi-pencil"
          [rounded]="true"
          [text]="true"
          (onClick)="userActionEvent('edit', profile.id)"
        />
        <p-button
          icon="pi pi-trash"
          [rounded]="true"
          severity="danger"
          [text]="true"
          (onClick)="userActionEvent('delete', profile.id)"
        />
        <p-button
          icon="pi pi-eye"
          [rounded]="true"
          severity="info"
          [text]="true"
          (onClick)="userActionEvent('view', profile.id)"
        />
      </td>
    </tr>
  </ng-template>
  <ng-template #footer>
    <tr>
      <td colspan="8">In total there are {{ profileData().length }} profiles.</td>
    </tr>
  </ng-template>
</p-table>
