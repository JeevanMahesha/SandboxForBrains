<div class="p-large">
  <p-toolbar>
    <ng-template #start>
      <div class="flex gap-2">
        <p-togglebutton
          [(ngModel)]="checked"
          onLabel="Newest"
          offLabel="Oldest"
          onIcon="pi pi-sort-amount-down-alt"
          offIcon="pi pi-sort-amount-up"
          class="w-36"
          ariaLabel="Do you confirm"
        />
        <p-button
          icon="pi pi-sparkles"
          (click)="zodiacSigns.toggle($event)"
          variant="outlined"
          severity="info"
          label="Zodica Signs"
        />
        <p-button
          icon="pi pi-star-fill"
          variant="outlined"
          severity="warn"
          label="Preferred Star"
        />
      </div>
    </ng-template>
    <ng-template #center>
      <p-iconfield iconPosition="left">
        <p-inputicon class="pi pi-search" />
        <input type="text" pInputText placeholder="Search" />
      </p-iconfield>
    </ng-template>
    <ng-template #end>
      <div class="flex gap-2">
        <p-select placeholder="Select Status" />
        <p-select placeholder="Select Star" />
      </div>
    </ng-template>
  </p-toolbar>
</div>
<!-- Table -->
<div class="">
  <p-table [value]="products()" stripedRows [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td>{{ product.code }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.quantity }}</td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" />
          <p-button icon="pi pi-trash" [rounded]="true" severity="danger" [text]="true" />
          <p-button icon="pi pi-eye" [rounded]="true" severity="warn" [text]="true" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
<app-profile />
<!-- Zodic Signs -->
<p-popover #zodiacSigns>
  <div class="flex flex-col gap-4 w-[25rem]">
    <p-table [value]="products()" stripedRows>
      <ng-template #header>
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Category</th>
        </tr>
      </ng-template>
      <ng-template #body let-product>
        <tr>
          <td>{{ product.code }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.category }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-popover>
