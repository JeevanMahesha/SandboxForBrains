<p-toolbar>
  <ng-template #start>
    <div class="flex flex-col gap-2 md:flex-row">
      <p-togglebutton
        [formField]="filterForm.viewOrderCheck"
        onLabel="Newest"
        offLabel="Oldest"
        onIcon="pi pi-sort-amount-down-alt"
        offIcon="pi pi-sort-amount-up"
        class="w-36"
        ariaLabel="Do you confirm"
      />
      <p-button
        icon="pi pi-sparkles"
        variant="outlined"
        severity="info"
        label="Zodiac Signs"
        (onClick)="openZodiacSignPopover($event)"
      />
      <p-button
        icon="pi pi-star-fill"
        variant="outlined"
        severity="warn"
        label="Preferred Star"
        (onClick)="openStarMatchPopover($event)"
      />
    </div>
  </ng-template>
  <ng-template #center>
    <div class="flex flex-col gap-1.5 md:flex-row">
      <p-iconfield iconPosition="left">
        <p-inputicon class="pi pi-search" />
        <input type="text" [formField]="filterForm.searchQuery" pInputText placeholder="Search" />
      </p-iconfield>
      <p-button icon="pi pi-user-plus" variant="outlined" severity="success" label="Add Profile" />
    </div>
  </ng-template>
  <ng-template #end>
    <div class="flex flex-col gap-2 md:flex-row">
      <p-select
        placeholder="Select Status"
        [options]="profileStatusOptions"
        [formField]="$any(filterForm.profileStatus)"
      />
      <p-select
        placeholder="Select Star"
        [options]="scoreMatchOptions"
        [formField]="$any(filterForm.starMatchScore)"
      />
      <p-button
        (onClick)="clearForm()"
        icon="pi pi-filter-slash"
        variant="outlined"
        severity="secondary"
        label="Clear"
      />
    </div>
  </ng-template>
</p-toolbar>
