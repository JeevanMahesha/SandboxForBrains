<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ProfileManager</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted/device theme before paint to avoid a flash of the wrong theme.
      (function () {
        var stored = localStorage.getItem('theme-preference');
        var dark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
